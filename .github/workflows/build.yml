name: Build instaladores

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    name: DMG (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build DMG
        run: npm run build:mac -- --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Print-Agent-mac
          path: dist/*.dmg
          retention-days: 7

      - name: Publicar no GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

  build-win:
    name: EXE (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build EXE
        run: npm run build:win -- --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Print-Agent-win
          path: dist/*.exe
          retention-days: 7

      - name: Publicar no GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
